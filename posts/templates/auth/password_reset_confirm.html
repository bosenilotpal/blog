{% extends "blog/base.html" %}
{% block content %}
{% load crispy_forms_tags %}
<div class="container py-5">
    <h1>Set a new password</h1>
    {% if validlink %}
    <form method="post">
        {% csrf_token %}
        {{ form|crispy }}
        <button class="btn btn-primary" type="submit">Change password</button>
    </form>
    {% else %}
    <p class="text-danger">This reset link is invalid or has already been used. Please request a new one.</p>
    <p><a href="{% url 'password_reset' %}">Request a new link</a></p>
    {% endif %}
</div>
{% endblock %}
